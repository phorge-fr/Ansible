---
- name: Install prerequisite packages for Docker
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Add NVIDIA GPG key
  ansible.builtin.apt_key:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    keyring: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    state: present
  become: true

- name: Add NVIDIA Container Toolkit repository
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    owner: root
    group: root
    mode: '0644'
    force: no
  become: true
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Ensure NVIDIA repository has signed-by clause
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    regexp: '^deb https://'
    replace: 'deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://'
  become: true

- name: Update package cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install NVIDIA Container Toolkit packages
  ansible.builtin.apt:
    name:
      - "nvidia-container-toolkit={{ nvidia_container_toolkit_version }}"
      - "nvidia-container-toolkit-base={{ nvidia_container_toolkit_version }}"
      - "libnvidia-container-tools={{ nvidia_container_toolkit_version }}"
      - "libnvidia-container1={{ nvidia_container_toolkit_version }}"
    state: present
  register: nvidia_packages_install
  notify: Configure Docker to use NVIDIA Container Runtime as default

