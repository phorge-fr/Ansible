---

- name: Create directory for ROCm keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  
- name: Convert ROCm GPG key to keyring
  ansible.builtin.apt_key:
    url: https://repo.radeon.com/rocm/rocm.gpg.key
    keyring: /etc/apt/keyrings/rocm.gpg
    state: present
  become: true
  
- name: Add AMDGPU repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/{{ rocm_version }} {{ ubuntu_codename }} main"
    filename: amdgpu
  become: true
  
- name: Add ROCm pin priority
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/rocm-pin-600
    content: |
      Package: *
      Pin: release o=repo.radeon.com
      Pin-Priority: 600
    mode: '0644'
  become: true
  
- name: Update package cache
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: Install ROCm packages
  ansible.builtin.apt:
    name:
      - rocm
    state: present
    update_cache: yes
